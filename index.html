<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plain Token | 星屑放映室</title>
  <meta name="description" content="前端工程 × AI 工具 · 带实践记录的个人博客。每篇文章背后都有一个实际做过的项目。">
  <meta name="theme-color" content="#fff7fb">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/app.js"></script>
</head>
<body>
  <div class="paper-texture" aria-hidden="true"></div>
  <div class="reading-progress" id="reading-progress"></div>

  <button class="back-to-top" id="back-to-top" type="button" aria-label="返回顶部" title="返回顶部">↑</button>

  <header class="topbar">
    <a class="brand-mark" href="#/" aria-label="Plain Token 首页">
      <span class="brand-kana">星屑</span>
      <span class="brand-name">Plain Token</span>
    </a>

    <nav class="topnav" aria-label="主导航">
      <a href="#/" data-route="home" class="active">文章</a>
      <a href="#/about" data-route="about">关于</a>
    </nav>

    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换昼夜主题">夜</button>
  </header>

  <main class="site-frame" id="main-content" tabindex="-1">
    <div class="loading-panel">
      <span class="loading-line"></span>
      <span>正在整理星屑档案...</span>
    </div>
  </main>

  <noscript>
    <div class="noscript-panel">这个博客需要启用 JavaScript 才能读取文章数据。</div>
  </noscript>
</body>
</html>
